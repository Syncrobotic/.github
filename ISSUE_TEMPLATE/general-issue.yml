name: 📌 General Issue
description: Anything that doesn't fit Task, Bug, or Feature.
title: "[Issue] "
labels: []
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the issue or topic.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant background or situation.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional notes
      description: Any other information, screenshots, or links.
    validations:
      required: false
