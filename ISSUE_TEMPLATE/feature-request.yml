name: ✨ Feature Request
description: Propose a new capability or product change.
title: "[Feature] <what you want>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! For a scoped engineering task, use the Task / Enhancement template instead.
  - type: checkboxes
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or system need is unmet today?
      placeholder: I want to be able to...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the capability or implementation you have in mind.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know it's done?
      value: |
        - [ ]
        - [ ]
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — must do
        - P1 — should do
        - P2 — nice to have
    validations:
      required: true
