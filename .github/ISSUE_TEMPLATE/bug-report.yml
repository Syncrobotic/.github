name: 🐛 Bug Report
description: Report a bug or something that isn't working as expected.
title: "[Bug] <what's broken>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🐛 Thanks for the report
        A clear repro is the fastest path to a fix. Fill in as much as you can. 🔧
  - type: checkboxes
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest version of the affected branch/build.
          required: true
        - label: I agree to follow this project's Code of Conduct.
          required: true
  - type: textarea
    id: description
    attributes:
      label: 🐞 What happened
      description: A clear and concise description of the bug and the actual behavior.
      placeholder: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 🎯 Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 🔁 Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll to '...'
        4. See the error
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 🖥️ Environment
      description: Branch/commit, browser/OS, and deployment tier.
      placeholder: "dev @ 0de27aa3, Chrome 141, macOS 14, local"
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: 🌡️ Severity
      options:
        - S0 — outage / data loss
        - S1 — major feature broken, no workaround
        - S2 — feature broken, workaround exists
        - S3 — minor / cosmetic
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 🗂️ Area
      multiple: true
      options:
        - api
        - auth
        - config
        - ci
        - database
        - data-layer
        - deployment
        - docs
        - i18n
        - infra
        - security
        - tooling
        - ui
        - other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 📎 Logs / screenshots
      description: |
        Relevant logs, request IDs, or screenshots. **Redact secrets.**
        Tip: drag & drop images here.
      render: shell
    validations:
      required: false
